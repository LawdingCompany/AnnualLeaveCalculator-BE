spring:
  application:
    name:

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  jackson:
    time-zone: Asia/Seoul

logging:
  level:
    root: INFO
    com.lawding.leavecalc: INFO

internal:
  secret: ${INTERNAL_AUTH_SECRET}

app:
  db:
    host: ${RDS_HOST}
    port: 5432
    name: ${DB_NAME}
    username: ${DB_USERNAME}
    region: ${AWS_REGION}

apple:
  team-id: ${APPLE_TEAM_ID}
  client-id: ${APPLE_CLIENT_ID}
  key-id: ${APPLE_KEY_ID}
  private-key: ${APPLE_PRIVATE_KEY}
  redirect-uri: ${APPLE_REDIRECT_URI}

jwt:
  secret: "TGF3RGluZzRLaW1fMjUwNDA3X1llb25DaGFQcm9qZWN0"
  access-expiration: 3600000