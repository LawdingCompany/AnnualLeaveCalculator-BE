name: Deploy LawDingBE to EC2 (DockerHub + SSM)

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-2

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set image tag
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "DEPLOY_IMAGE=${{ secrets.DOCKER_USERNAME }}/lawding:${SHORT_SHA}" >> $GITHUB_ENV

      - name: Build and Push Docker Image
        run: |
          docker build --no-cache \
            -t ${{ env.DEPLOY_IMAGE }} \
            -t ${{ secrets.DOCKER_USERNAME }}/lawding:latest \
            ./backend/leavecalc
          docker push ${{ env.DEPLOY_IMAGE }}
          docker push ${{ secrets.DOCKER_USERNAME }}/lawding:latest

      - name: Deploy on EC2 via SSM
        env:
          DOCKER_USER: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASS: ${{ secrets.DOCKER_PASSWORD }}
          RDS_HOST: ${{ secrets.RDS_HOST }}
          RDS_PORT: ${{ secrets.RDS_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          AWS_REGION_VAL: ${{ secrets.AWS_REGION }}
          INTERNAL_AUTH_SECRET: ${{ secrets.INTERNAL_AUTH_SECRET }}
          BASE_URL: ${{ secrets.BASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          APPLE_CLIENT_ID: ${{ secrets.APPLE_CLIENT_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_KEY_ID: ${{ secrets.APPLE_KEY_ID }}
          APPLE_PRIVATE_KEY: ${{ secrets.APPLE_PRIVATE_KEY }}
        run: |
          INSTANCE_ID=${{ secrets.EC2_INSTANCE_ID }}
          IMAGE=${{ env.DEPLOY_IMAGE }}

          COMMANDS=$(jq -n \
            --arg image "$IMAGE" \
            --arg docker_user "$DOCKER_USER" \
            --arg docker_pass "$DOCKER_PASS" \
            --arg instance_id "$INSTANCE_ID" \
            --arg rds_host "$RDS_HOST" \
            --arg rds_port "$RDS_PORT" \
            --arg db_name "$DB_NAME" \
            --arg db_username "$DB_USERNAME" \
            --arg aws_region "$AWS_REGION_VAL" \
            --arg internal_auth_secret "$INTERNAL_AUTH_SECRET" \
            --arg base_url "$BASE_URL" \
            --arg jwt_secret "$JWT_SECRET" \
            --arg apple_client_id "$APPLE_CLIENT_ID" \
            --arg apple_team_id "$APPLE_TEAM_ID" \
            --arg apple_key_id "$APPLE_KEY_ID" \
            --arg apple_private_key "$APPLE_PRIVATE_KEY" \
            '{
              commands: [
                "set -e",
                ("echo " + $docker_pass + " | docker login -u " + $docker_user + " --password-stdin"),
                ("docker pull " + $image),
                "docker stop lawdingbe || true",
                "docker rm lawdingbe || true",
                ("docker run -d --name lawdingbe -p 8080:8080 --restart=always --log-driver=awslogs --log-opt awslogs-region=ap-northeast-2 --log-opt awslogs-group=/ec2/lawdingbe --log-opt awslogs-create-group=true --log-opt awslogs-stream=" + $instance_id + "-lawdingbe -e TZ=Asia/Seoul -e JAVA_TOOL_OPTIONS=-Duser.timezone=Asia/Seoul -e SPRING_JACKSON_TIME_ZONE=Asia/Seoul -e SPRING_JPA_PROPERTIES_HIBERNATE_JDBC_TIME_ZONE=Asia/Seoul -e SPRING_PROFILES_ACTIVE=prod -e RDS_HOST=" + $rds_host + " -e RDS_PORT=" + $rds_port + " -e DB_NAME=" + $db_name + " -e DB_USERNAME=" + $db_username + " -e AWS_REGION=" + $aws_region + " -e INTERNAL_AUTH_SECRET=" + $internal_auth_secret + " -e BASE_URL=" + $base_url + " -e JWT_SECRET=" + $jwt_secret + " -e APPLE_CLIENT_ID=" + $apple_client_id + " -e APPLE_TEAM_ID=" + $apple_team_id + " -e APPLE_KEY_ID=" + $apple_key_id + " -e APPLE_PRIVATE_KEY='" + $apple_private_key + "' " + $image),
                ("docker image ls " + $docker_user + "/lawding -q | tail -n +2 | xargs -r docker rmi -f || true"),
                "docker image prune -f || true"
              ]
            }')

          COMMAND_ID=$(aws ssm send-command \
            --cli-binary-format raw-in-base64-out \
            --targets "Key=instanceIds,Values=$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy LawDingBE-prod" \
            --parameters "$COMMANDS" \
            --query "Command.CommandId" \
            --output text)

          echo "CommandId: $COMMAND_ID"

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID"

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "Status" \
            --output text)

          echo "Deploy status: $STATUS"
          [ "$STATUS" = "Success" ] || exit 1
