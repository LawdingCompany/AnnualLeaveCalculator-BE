name: Deploy Leavecalc to EC2 (DockerHub + SSM)

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-2

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set image tags
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          DATE_TAG=$(date +'%Y%m%d')
          echo "IMAGE_TAG_LATEST=${{ secrets.DOCKER_USERNAME }}/leavecalc:latest" >> $GITHUB_ENV
          echo "IMAGE_TAG_SHA=${{ secrets.DOCKER_USERNAME }}/leavecalc:${SHORT_SHA}" >> $GITHUB_ENV
          echo "IMAGE_TAG_DATE=${{ secrets.DOCKER_USERNAME }}/leavecalc:${DATE_TAG}-${SHORT_SHA}" >> $GITHUB_ENV
          echo "DEPLOY_IMAGE=${{ secrets.DOCKER_USERNAME }}/leavecalc:${SHORT_SHA}" >> $GITHUB_ENV

      - name: Build and Push Docker Image
        run: |
          docker build --no-cache \
            -t ${{ env.IMAGE_TAG_LATEST }} \
            -t ${{ env.IMAGE_TAG_SHA }} \
            -t ${{ env.IMAGE_TAG_DATE }} \
            ./backend/leavecalc

          docker push ${{ env.IMAGE_TAG_LATEST }}
          docker push ${{ env.IMAGE_TAG_SHA }}
          docker push ${{ env.IMAGE_TAG_DATE }}

      - name: Deploy on EC2 via SSM
        run: |
          INSTANCE_ID=${{ secrets.EC2_INSTANCE_ID }}
          IMAGE=${{ env.DEPLOY_IMAGE }}

          aws ssm send-command \
            --cli-binary-format raw-in-base64-out \
            --targets "Key=instanceIds,Values=$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy leavecalc-prod" \
            --parameters '{
              "commands": [
                "set -e",
                "docker pull '"$IMAGE"'",
                "docker stop leavecalc || true",
                "docker rm leavecalc || true",
                "docker run -d --name leavecalc -p 8080:8080 --restart=always --log-driver=awslogs --log-opt awslogs-region=ap-northeast-2 --log-opt awslogs-group=/ec2/leavecalc --log-opt awslogs-create-group=true --log-opt awslogs-stream='"$INSTANCE_ID"'-leavecalc -e TZ=Asia/Seoul -e JAVA_TOOL_OPTIONS=-Duser.timezone=Asia/Seoul -e SPRING_JACKSON_TIME_ZONE=Asia/Seoul -e SPRING_JPA_PROPERTIES_HIBERNATE_JDBC_TIME_ZONE=Asia/Seoul -e RDS_HOST=${{ secrets.RDS_HOST }} -e DB_NAME=${{ secrets.DB_NAME }} -e DB_USERNAME=${{ secrets.DB_USERNAME }} -e INTERNAL_AUTH_SECRET=${{ secrets.INTERNAL_AUTH_SECRET }} -e AWS_REGION=${{ secrets.AWS_REGION }} '"$IMAGE"'",
                "docker image ls ${{ secrets.DOCKER_USERNAME }}/leavecalc -q | tail -n +2 | xargs -r docker rmi -f || true",
                "docker image prune -f || true"
              ]
            }'
