name: Deploy LawDingBE to EC2 (DockerHub + SSM)

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-24.04-arm # ✅ 네이티브 arm64 러너

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-2

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set image tag
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "DEPLOY_IMAGE=${{ secrets.DOCKER_USERNAME }}/lawding:${SHORT_SHA}" >> $GITHUB_ENV

      - name: Build and Push Docker Image
        run: |
          docker build --no-cache \
            -t ${{ env.DEPLOY_IMAGE }} \
            -t ${{ secrets.DOCKER_USERNAME }}/lawding:latest \
            ./backend/leavecalc
          docker push ${{ env.DEPLOY_IMAGE }}
          docker push ${{ secrets.DOCKER_USERNAME }}/lawding:latest

      - name: Deploy on EC2 via SSM
        env:
          DOCKER_USER: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASS: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          INSTANCE_ID=${{ secrets.EC2_INSTANCE_ID }}
          IMAGE=${{ env.DEPLOY_IMAGE }}

          aws ssm send-command \
            --cli-binary-format raw-in-base64-out \
            --targets "Key=instanceIds,Values=$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy LawDingBE-prod" \
            --parameters '{
              "commands": [
                "set -e",
                "docker login -u ${DOCKER_USER} -p ${DOCKER_PASS}",
                "docker pull '"$IMAGE"'",
                "docker stop lawdingbe || true",
                "docker rm lawdingbe || true",
                "docker run -d --name lawdingbe -p 8080:8080 --restart=always --log-driver=awslogs --log-opt awslogs-region=ap-northeast-2 --log-opt awslogs-group=/ec2/lawdingbe --log-opt awslogs-create-group=true --log-opt awslogs-stream='"$INSTANCE_ID"'-lawdingbe -e TZ=Asia/Seoul -e JAVA_TOOL_OPTIONS=-Duser.timezone=Asia/Seoul -e SPRING_JACKSON_TIME_ZONE=Asia/Seoul -e SPRING_JPA_PROPERTIES_HIBERNATE_JDBC_TIME_ZONE=Asia/Seoul -e SPRING_PROFILES_ACTIVE=prod -e RDS_HOST=${{ secrets.RDS_HOST }} -e RDS_PORT=${{ secrets.RDS_PORT }} -e DB_NAME=${{ secrets.DB_NAME }} -e DB_USERNAME=${{ secrets.DB_USERNAME }} -e AWS_REGION=${{ secrets.AWS_REGION }} -e INTERNAL_AUTH_SECRET=${{ secrets.INTERNAL_AUTH_SECRET }} -e BASE_URL=${{ secrets.BASE_URL }} -e JWT_SECRET=${{ secrets.JWT_SECRET }} -e APPLE_CLIENT_ID=${{ secrets.APPLE_CLIENT_ID }} -e APPLE_TEAM_ID=${{ secrets.APPLE_TEAM_ID }} -e APPLE_KEY_ID=${{ secrets.APPLE_KEY_ID }} -e APPLE_PRIVATE_KEY=${{ secrets.APPLE_PRIVATE_KEY }} '"$IMAGE"'",
                "docker image ls ${{ secrets.DOCKER_USERNAME }}/lawding -q | tail -n +2 | xargs -r docker rmi -f || true",
                "docker image prune -f || true"
              ]
            }'
